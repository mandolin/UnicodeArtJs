# UnicodeArtJs 默认配置文件
# 文件名: .unicode-artrc.yml 或 unicode-art.config.js

# 输出配置
output:
  format: plain          # plain | html | ansi
  trimTrailingSpaces: false
  target: terminal       # plain | terminal | web | vscode | electron | html | ansi

# 图片输入配置
image:
  # Node 图片后端: sharp | napi-rs
  # napi-rs 是宽松许可证实验后端，首批目标格式为 PNG / JPEG / WebP / BMP。
  backend: sharp

# 裱框配置，可设为 false、true、样式名或对象
# box:
#   mode: outer           # outer | lines | cells | grid
#   renderStage: post     # post | layout
#   style: round          # single | double | round | bold | classic | ascii | singleDouble | doubleSingle | arrow | block | thick | none
#   padding: 1
#   width: auto           # auto 或非负整数
#   height: auto          # auto 或非负整数，表示内容区行数
#   verticalAlign: top    # top | middle | bottom
#   overflow: expand      # expand | truncate | wrap
#   shadow: false         # false | true | { style, offsetX, offsetY }
#   separators:
#     rows: false         # true | false | number[]
#     columns: false      # true | false
#   cell:
#     padding: 0
#     minWidth: 0
#     minHeight: 0
#   title:
#     text: UnicodeArtJs
#     align: center

# 尺寸配置
size:
  height: 20             # 默认高度（行数）
  # width: 80            # 可选：固定宽度

# 字符集配置
charset:
  type: ASCII            # ASCII | EXTENDED | CHINESE_SIMPLE
  # customChars: " .:-=+*#%@"

# 字体配置
font:
  name: Noto Sans SC     # 字体名称或路径
  style: regular         # regular | bold | italic | bold-italic
  reduce: 0.8            # 字体缩放比例

# 新配置模型中的视觉字体 / 字素字体
visualFont:
  family: Noto Sans SC
  reduce: 0
glyphFont:
  family: Sarasa Mono SC, LXGW WenKai Mono, Source Code Pro, Liberation Mono, monospace
  widthProfile: default  # 当前为预留配置
  # wideCharRegex: "[\\u4E00-\\u9FFF]"

# 算法配置
algorithm:
  matrixSize: 6          # 字符矩阵大小
  ratio: 2.0             # 垂直/水平比例
  interpolation: bilinear # nearest | bilinear | bicubic
  wideCharRatio: 1.5     # 宽字符匹配阈值
  enableEarlyTermination: true  # 启用早期终止优化

# 颜色配置
color:
  invert: false          # 是否反转颜色

# 文本配置（仅text命令）
text:
  align: left            # left | center | right
  lineSpacing: 1.0       # 行间距倍数
  heightMode: line       # line | total

# 性能配置
performance:
  maxParallelTasks: 0    # 最大并行任务数（0=自动）

# 国际化
i18n:
  lang: zh-CN            # zh-CN | en-US
