# GitHub Actions: 部署 Web 应用到 GitHub Pages
#
# 当推送到 main 分支时:
#   1. 构建 Core 库
#   2. 构建 Web 包
#   3. 部署到 GitHub Pages
#
# 需要在仓库 Settings → Pages 中设置:
#   Source: GitHub Actions

name: Deploy Web to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-web.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'docs/**'
      - 'packages/core/**'
      - 'packages/web/**'
      - 'scripts/check-*-docs.cjs'
      - 'scripts/generate-*-docs.cjs'
      - 'scripts/generate-public-docs-site-data.cjs'
      - 'tools/docs/**'
      - 'tsdoc.*.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Core library
        run: npm run build:core

      - name: Check documentation site data
        run: npm run docs:all:check

      - name: Install Playwright browser
        # 使用 Web/Core 工作区已锁定的 Playwright，避免根目录 npx 隐式下载或解析版本。
        run: npm --workspace packages/core exec -- playwright install --with-deps chromium

      - name: Lint Web
        run: npm run lint:web

      - name: Test Web
        run: npm run test:web

      - name: Build Web application
        run: npm run build:web

      - name: Smoke Test Web
        run: npm run test:web:e2e

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./packages/web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Smoke deployed Pages
        env:
          BASE_URL: ${{ steps.deployment.outputs.page_url }}
        run: npm --workspace packages/web run test:e2e
