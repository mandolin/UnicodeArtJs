# GitHub Actions: 多端基础验证
#
# 覆盖 Core、CLI、Web 与 VSCode Extension 的基础检查。
# Web 的 GitHub Pages 发布仍由 deploy-web.yml 独立负责。

name: CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "package.json"
      - "mise.toml"
      - "packages/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "package.json"
      - "mise.toml"
      - "packages/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Full Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        # 显式使用 Core workspace 的固定 Playwright，避免根目录 npx 隐式下载或解析其他版本。
        run: npm --workspace packages/core exec -- playwright install --with-deps chromium

      - name: Run repository release gate
        run: npm run release:gate

  native-install:
    name: Native Install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Core
        run: npm run build:core

      - name: Test Node consumers
        run: npm run test:core && npm run test:cli
