# GitHub Actions: 多端基础验证
#
# 覆盖 Core、CLI、Web 与 VSCode Extension 的基础检查。
# Web 的 GitHub Pages 发布仍由 deploy-web.yml 独立负责。

name: CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "package.json"
      - "package-lock.json"
      - "mise.toml"
      - "tsdoc.*.json"
      - "docs/**"
      - "scripts/**"
      - "tools/docs/**"
      - "packages/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "package.json"
      - "package-lock.json"
      - "mise.toml"
      - "tsdoc.*.json"
      - "docs/**"
      - "scripts/**"
      - "tools/docs/**"
      - "packages/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Full Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        # 显式使用 Core workspace 的固定 Playwright，避免根目录 npx 隐式下载或解析其他版本。
        run: npm --workspace packages/core exec -- playwright install --with-deps chromium

      - name: Check CLI Docs
        run: npm run docs:cli:check

      - name: Check Web Docs
        run: npm run docs:web:check

      - name: Check Core TSDoc
        run: npm run docs:tsdoc:core:check

      - name: Check VS Code TSDoc
        run: npm run docs:tsdoc:vscode:check

      - name: Check Documentation Contract
        run: npm run docs:contract:check

      - name: Check Documentation Quality
        run: npm run docs:quality:check

      - name: Check Documentation Manifest
        run: npm run docs:manifest:check

      - name: Check Public Docs Site Data
        run: npm run docs:public-site:check

      - name: Check Public API Reference
        run: npm run docs:api-reference:check

      - name: Check Developer Docs Architecture
        run: npm run docs:architecture:check

      - name: Check Compatibility Docs
        run: npm run compatibility-docs:check

      - name: Check Recipes
        run: npm run recipes:check

      - name: Check Gallery
        run: npm run gallery:check

      - name: Check Support Governance
        run: npm run support:check

      - name: Check Public Entrypoints
        run: npm run public-entry:check

      - name: Check Experimental Stability Matrix
        run: npm run stability:check

      - name: Check Config Model
        run: npm run config-model:check

      - name: Check Glyph Width Layout
        run: npm run glyph-width:check

      - name: Check Semantic UAF Beta
        run: npm run semantic-uaf-beta:check

      - name: Check Extension SDK
        run: npm run extension-sdk:check

      - name: Check Creative Ecosystem
        run: npm run creative-ecosystem:check

      - name: Check Desktop Host Baseline
        run: npm run desktop-host:check

      - name: Check Optional Input Adapters
        run: npm run optional-adapters:check

      - name: Check Performance Release Plan
        run: npm run performance-release:check

      - name: Check Release Materials
        run: npm run release-materials:check

      # 保持与本地 release:gate 相同的覆盖范围，但拆分步骤以便远端直接显示失败边界。
      - name: Check Core
        run: npm run check:core

      - name: Check CLI
        run: npm run check:cli

      - name: Check Web
        run: npm run check:web

      - name: Check VS Code Extension
        run: npm run check:vscode

      - name: Pack Core
        run: npm run pack:core

      - name: Pack CLI
        run: npm run pack:cli

      - name: Package VS Code Extension
        run: npm run package:vscode

      - name: Verify release metadata and fixtures
        run: npm run release:verify

  native-install:
    name: Native Install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Core
        run: npm run build:core

      - name: Test Node consumers and native runtimes
        run: >-
          npm run typecheck:core &&
          npm run test:core &&
          npm --workspace packages/core run test:node-runtime &&
          npm --workspace packages/core run test:node-package-runtime &&
          npm run test:cli
